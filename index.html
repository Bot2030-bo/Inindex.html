<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICHANCY MONSTER EDITION</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Tahoma';
-webkit-tap-highlight-color:transparent;
}

body{
background:
radial-gradient(circle at top,#1e293b,#020617);
color:white;
overflow-x:hidden;
min-height:100vh;
}

.container{
max-width:500px;
margin:auto;
padding:15px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
border-radius:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
margin-bottom:15px;
border:1px solid rgba(255,215,0,0.2);
}

.logo{
font-size:26px;
font-weight:bold;
color:gold;
text-shadow:0 0 15px gold;
}

.balance-box{
background:black;
padding:10px 15px;
border-radius:15px;
font-weight:bold;
color:gold;
}

.stats{
display:flex;
justify-content:space-between;
background:rgba(255,255,255,0.04);
padding:12px;
border-radius:15px;
margin-bottom:20px;
font-size:14px;
}

.wheel-area{
position:relative;
width:320px;
height:320px;
margin:auto;
}

#wheel{
width:100%;
height:100%;
border-radius:50%;
box-shadow:
0 0 25px rgba(255,215,0,0.5),
0 0 50px rgba(255,215,0,0.2);
background:#111827;
transition:
transform 5s cubic-bezier(.17,.67,.13,.99);
}

.pointer{
position:absolute;
top:-15px;
left:50%;
transform:translateX(-50%);
width:0;
height:0;
border-left:18px solid transparent;
border-right:18px solid transparent;
border-top:45px solid gold;
z-index:10;
filter:drop-shadow(0 0 10px gold);
}

.spin-btn{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:90px;
height:90px;
border-radius:50%;
border:none;
font-size:20px;
font-weight:bold;
background:
linear-gradient(145deg,gold,orange);
cursor:pointer;
z-index:20;
box-shadow:0 0 25px rgba(255,215,0,0.6);
}

.controls{
display:flex;
gap:10px;
margin-top:25px;
}

.controls button{
flex:1;
padding:14px;
border:none;
border-radius:15px;
background:
linear-gradient(145deg,#1e293b,#0f172a);
color:white;
font-weight:bold;
font-size:15px;
cursor:pointer;
}

.message{
margin-top:20px;
padding:15px;
border-radius:15px;
text-align:center;
font-weight:bold;
display:none;
}

.success{
background:#14532d;
}

.error{
background:#7f1d1d;
}

.login-screen{
position:fixed;
inset:0;
background:rgba(0,0,0,0.95);
display:flex;
justify-content:center;
align-items:center;
z-index:99999;
}

.login-card{
width:90%;
max-width:380px;
background:#111827;
padding:30px;
border-radius:25px;
border:1px solid gold;
box-shadow:0 0 25px rgba(255,215,0,0.2);
}

.login-card h2{
text-align:center;
margin-bottom:20px;
color:gold;
}

.login-card input{
width:100%;
padding:15px;
margin-bottom:15px;
border:none;
border-radius:15px;
background:#0f172a;
color:white;
font-size:15px;
}

.login-card button{
width:100%;
padding:14px;
border:none;
border-radius:15px;
background:gold;
font-weight:bold;
margin-top:10px;
cursor:pointer;
}

.admin-panel{
margin-top:25px;
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:20px;
display:none;
}

.admin-panel h3{
margin-bottom:15px;
color:gold;
}

.admin-panel input{
width:100%;
padding:12px;
margin-bottom:10px;
border:none;
border-radius:12px;
background:#0f172a;
color:white;
}

.admin-panel button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:gold;
font-weight:bold;
margin-bottom:10px;
cursor:pointer;
}

.fake-popup{
position:fixed;
left:20px;
bottom:20px;
background:#111827;
padding:15px;
border-radius:15px;
border:1px solid gold;
z-index:999;
animation:fade .5s;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.king-scene{
position:fixed;
inset:0;
background:rgba(0,0,0,0.95);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:999999;
}

.king-scene img{
width:250px;
animation:float 2s infinite ease-in-out;
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0);}
}

.king-scene h1{
font-size:42px;
color:gold;
margin-top:20px;
text-shadow:0 0 20px gold;
}

</style>
</head>

<body>

<div class="login-screen" id="loginScreen">

<div class="login-card">

<h2>👑 ICHANCY</h2>

<input type="text"
id="username"
placeholder="اسم المستخدم">

<input type="password"
id="password"
placeholder="كلمة المرور">

<button onclick="login()">
تسجيل دخول
</button>

<button onclick="signup()">
إنشاء حساب
</button>

</div>

</div>

<div class="king-scene"
id="kingScene">

<img src="https://i.imgur.com/u6dY6Qx.png">

<h1>
🎉 JACKPOT 🎉
</h1>

</div>

<div class="container">

<div class="topbar">

<div class="logo">
👑 ICHANCY
</div>

<div class="balance-box">
💰 <span id="balance">0</span>
</div>

</div>

<div class="stats">

<div>
🟢 المتصلون:
<span id="onlineUsers">
184
</span>
</div>

<div>
🏆 آخر فائز:
<span id="lastWinner">
---
</span>
</div>

</div>

<div class="wheel-area">

<div class="pointer"></div>

<canvas id="wheel"
width="500"
height="500"></canvas>

<button class="spin-btn"
onclick="spinWheel()">
SPIN
</button>

</div>

<div class="controls">

<button onclick="giftCode()">
🎁 كود
</button>

<button onclick="withdraw()">
💸 سحب
</button>

<button onclick="logout()">
🚪 خروج
</button>

</div>

<div class="message"
id="message"></div>

<div class="admin-panel"
id="adminPanel">

<h3>
👑 لوحة التحكم
</h3>

<input type="number"
id="giftAmount"
placeholder="قيمة الكود">

<button onclick="generateCode()">
إنشاء كود هدية
</button>

<input type="text"
id="targetUser"
placeholder="اسم المستخدم">

<input type="number"
id="chargeAmount"
placeholder="المبلغ">

<button onclick="chargeUser()">
شحن رصيد
</button>

</div>

</div>

<audio id="spinAudio"
src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8c8a73467.mp3"></audio>

<audio id="winAudio"
src="https://cdn.pixabay.com/audio/2022/03/10/audio_2701d61d3f.mp3"></audio>

<script>

const canvas=
document.getElementById("wheel");

const ctx=
canvas.getContext("2d");

const segments=[
{txt:"0",value:0,color:"#111827"},
{txt:"1000",value:1000,color:"#f59e0b"},
{txt:"0",value:0,color:"#1e293b"},
{txt:"5000",value:5000,color:"#facc15"},
{txt:"0",value:0,color:"#111827"},
{txt:"30000",value:30000,color:"#f97316"}
];

let users=
JSON.parse(localStorage.getItem("users"))||{};

let giftCodes=
JSON.parse(localStorage.getItem("giftCodes"))||{};

let currentUser=null;

let rotation=0;

let spinning=false;

function save(){

localStorage.setItem(
"users",
JSON.stringify(users)
);

localStorage.setItem(
"giftCodes",
JSON.stringify(giftCodes)
);

}

function drawWheel(){

let center=250;

let radius=240;

ctx.clearRect(0,0,500,500);

segments.forEach((seg,i)=>{

let angle=
(2*Math.PI)/segments.length;

let start=i*angle;

let end=start+angle;

ctx.beginPath();

ctx.moveTo(center,center);

ctx.arc(
center,
center,
radius,
start,
end
);

ctx.fillStyle=seg.color;

ctx.fill();

ctx.save();

ctx.translate(center,center);

ctx.rotate(start+angle/2);

ctx.fillStyle="white";

ctx.font="bold 24px Arial";

ctx.fillText(seg.txt,120,10);

ctx.restore();

});

}

drawWheel();

function show(msg,type="success"){

const box=
document.getElementById("message");

box.innerHTML=msg;

box.className=
"message "+type;

box.style.display="block";

setTimeout(()=>{

box.style.display="none";

},3000);

}

function signup(){

let user=
document.getElementById("username").value;

let pass=
document.getElementById("password").value;

if(!user||!pass){

show("املأ البيانات","error");

return;

}

if(users[user]){

show("الحساب موجود","error");

return;

}

users[user]={
password:pass,
balance:5000,
admin:false
};

save();

show("تم إنشاء الحساب");

}

function login(){

let user=
document.getElementById("username").value;

let pass=
document.getElementById("password").value;

if(
user==="admin"
&&
pass==="admin123"
){

currentUser={
name:"admin",
balance:999999,
admin:true
};

document.getElementById("adminPanel")
.style.display="block";

}else{

if(
!users[user]
||
users[user].password!==pass
){

show("بيانات خاطئة","error");

return;

}

currentUser={
name:user,
balance:users[user].balance,
admin:false
};

}

document.getElementById("balance")
.innerText=currentUser.balance;

document.getElementById("loginScreen")
.style.display="none";

}

function logout(){

location.reload();

}

function updateBalance(){

document.getElementById("balance")
.innerText=currentUser.balance;

if(
currentUser
&&
!currentUser.admin
){

users[currentUser.name].balance=
currentUser.balance;

save();

}

}

function spinWheel(){

if(spinning)return;

if(!currentUser){

show("سجل الدخول","error");

return;

}

if(currentUser.balance<2500){

show("الرصيد غير كافي","error");

return;

}

spinning=true;

document.getElementById("spinAudio")
.play();

currentUser.balance-=2500;

updateBalance();

let prizes=[
0,
0,
0,
1000,
5000,
30000
];

let prize=
prizes[
Math.floor(Math.random()*prizes.length)
];

let indexes=[];

segments.forEach((s,i)=>{

if(s.value===prize){

indexes.push(i);

}

});

let index=
indexes[
Math.floor(Math.random()*indexes.length)
];

let degree=
360*8+
(index*60);

rotation+=degree;

canvas.style.transform=
`rotate(${rotation}deg)`;

setTimeout(()=>{

if(prize>0){

currentUser.balance+=prize;

updateBalance();

show(
`🎉 ربحت ${prize}`
);

document.getElementById("winAudio")
.play();

document.getElementById("lastWinner")
.innerText=
currentUser.name;

if(prize>=30000){

document.getElementById("kingScene")
.style.display="flex";

setTimeout(()=>{

document.getElementById("kingScene")
.style.display="none";

},5000);

}

}else{

show("😢 خسرت","error");

}

spinning=false;

},5000);

}

function generateCode(){

if(!currentUser.admin)return;

let amount=
parseInt(
document.getElementById("giftAmount").value
);

if(!amount)return;

let code=
"GIFT"+
Math.random()
.toString(36)
.substring(2,8)
.toUpperCase();

giftCodes[code]=amount;

save();

show(
`🎁 ${code}`
);

}

function giftCode(){

let code=
prompt("أدخل الكود");

if(!giftCodes[code]){

show("كود خاطئ","error");

return;

}

currentUser.balance+=giftCodes[code];

updateBalance();

show(
`تم إضافة ${giftCodes[code]}`
);

delete giftCodes[code];

save();

}

function withdraw(){

if(currentUser.balance<80000){

show(
"الحد الأدنى 80000",
"error"
);

return;

}

let code=
"WD"+
Math.random()
.toString(36)
.substring(2,8)
.toUpperCase();

show(
`كود السحب: ${code}`
);

}

function chargeUser(){

if(!currentUser.admin)return;

let user=
document.getElementById("targetUser").value;

let amount=
parseInt(
document.getElementById("chargeAmount").value
);

if(!users[user]){

show(
"المستخدم غير موجود",
"error"
);

return;

}

users[user].balance+=amount;

save();

show("تم الشحن");

}

setInterval(()=>{

document.getElementById("onlineUsers")
.innerText=
Math.floor(Math.random()*100)+150;

},120000);

const fakeNames=[
"أحمد",
"خالد",
"نور",
"ليث",
"يوسف",
"محمد"
];

setInterval(()=>{

let div=
document.createElement("div");

div.className="fake-popup";

let name=
fakeNames[
Math.floor(Math.random()*fakeNames.length)
];

let amount=
[5000,10000,30000]
[Math.floor(Math.random()*3)];

div.innerHTML=
`🎉 اللاعب ${name} ربح ${amount}`;

document.body.appendChild(div);

setTimeout(()=>{

div.remove();

},4000);

},120000);

</script>

</body>
</html>
